<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram Clone</title>
</head>
<body>
     <!-- App Wrapper Layout Container -->
  <div class="app-container">

    <!-- 1. LEFT SIDEBAR NAVIGATION -->
    <aside class="sidebar-nav">
      <div class="logo">Instagram</div>
      <nav class="nav-links">
        <a href="#" class="nav-item active"><span class="icon">🏠</span> Home</a>
        <a href="#" class="nav-item"><span class="icon">🔍</span> Search</a>
        <a href="#" class="nav-item"><span class="icon">🧭</span> Explore</a>
        <a href="#" class="nav-item"><span class="icon">🎬</span> Reels</a>
        <a href="#" class="nav-item"><span class="icon">✉️</span> Messages</a>
        <a href="#" class="nav-item"><span class="icon">❤️</span> Notifications</a>
        <a href="#" class="nav-item"><span class="icon">➕</span> Create</a>
        <a href="#" class="nav-item"><span class="icon">👤</span> Profile</a>
      </nav>
    </aside>




 <!-- 2. MAIN FEED AND STORIES AREA -->
    <main class="feed-container">
      
      <!-- Stories Bar -->
      <section class="stories-bar">
        <div class="story-item">
          <div class="story-ring"><img src="https://unsplash.com" alt="User"></div>
          <span class="story-username">rohit_singh</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><img src="https://unsplash.com" alt="User"></div>
          <span class="story-username">kirat_cohort</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><img src="https://unsplash.com" alt="User"></div>
          <span class="story-username">sara_dev</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><img src="https://unsplash.com" alt="User"></div>
          <span class="story-username">alex_coding</span>
        </div>
      </section>





      
</body>
</html>
