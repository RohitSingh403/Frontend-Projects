<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Web File Manager</title>
  </head>
  <body>
    <!-- Main Workspace Application Wrapper Container -->
    <div class="app-container">
      <!-- Left Sidebar Navigation Panel -->
      <aside class="sidebar">
        <div class="sidebar-brand">CloudDrive</div>
        <nav class="sidebar-menu">
          <button class="menu-item active" data-target="all">
            <span class="icon">📁</span> All Files
          </button>
          <button class="menu-item" data-target="recent">
            <span class="icon">🕒</span> Recent
          </button>
          <button class="menu-item" data-target="starred">
            <span class="icon">⭐</span> Starred
          </button>
          <button class="menu-item" data-target="trash">
            <span class="icon">🗑️</span> Trash
          </button>
        </nav>
      </aside>

      <!-- Right Main Viewport Stream Box -->
      <main class="main-content">
        <!-- Top Controls and Breadcrumbs Bar Elements -->
        <header class="content-header">
          <div id="breadcrumb-trail" class="breadcrumbs">
            <span class="crumb-link" data-folder-id="root">Root</span>
          </div>
          <div class="action-bar">
            <button id="new-folder-btn" class="action-btn secondary-btn">
              + New Folder
            </button>
            <button id="upload-file-btn" class="action-btn primary-btn">
              + Upload File
            </button>
          </div>
        </header>

        <!-- Grid Matrix Display Area holding Items -->
        <section id="file-grid" class="file-grid-layout">
          <!-- Items injected dynamically via JavaScript will land here -->
        </section>
      </main>
    </div>

    <!-- Hidden native file input element tracker for simulating document uploads -->
    <input type="file" id="hidden-file-input" style="display: none" />

    <!-- Connect local interactivity script parameter pipelines -->
    <script src="script.js"></script>
  </body>
</html>
