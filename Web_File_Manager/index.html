<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">n
    <title>Web File Manager</title>
</head>
<body>
     <!-- Main Workspace Application Wrapper Container -->
    <div class="app-container">
        
        <!-- Left Sidebar Navigation Panel -->
        <aside class="sidebar">
            <div class="sidebar-brand">CloudDrive</div>
            <nav class="sidebar-menu">
                <button class="menu-item active" data-target="all"><span class="icon">📁</span> All Files</button>
                <button class="menu-item" data-target="recent"><span class="icon">🕒</span> Recent</button>
                <button class="menu-item" data-target="starred"><span class="icon">⭐</span> Starred</button>
                <button class="menu-item" data-target="trash"><span class="icon">🗑️</span> Trash</button>
            </nav>
        </aside>


        


        <script src="script.js"></script>
</body>
</html>
