<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tribute to Steve Jobs</title>
</head>
<body>
     <!-- Main Tribute Wrapper Container -->
  <main id="tribute-container">

    <!-- Top Section: Header and Main Image -->
    <header class="tribute-header">
      <h1 id="title">Steve Jobs</h1>
      <p class="subtitle">The Visionary Co-founder of Apple Inc. and Pixar Animation</p>
      
      <figure id="img-div">
        <img id="image" src="https://unsplash.com" alt="Tech and innovation aesthetic representing Steve Jobs legacy">
        <figcaption id="img-caption">Steve Jobs changed the world by putting a powerhouse computer inside everyone's pocket.</figcaption>
      </figure>
    </header>




    
</body>
</html>
