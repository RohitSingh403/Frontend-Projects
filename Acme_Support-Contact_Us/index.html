<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Acme Support - Contact Us</title>
  </head>
  <body>
    <div class="page-wrapper">
      <header>
        <div class="brand-logo">Acme Support</div>
        <nav class="navigation-menu">
          <a href="#">Home</a>
          <a href="#">Help</a>
          <a href="#">Contact</a>
        </nav>
        <hr class="section-divider" />
      </header>

      <main>
        <h1 class="main-title">Contact Us</h1>
        <p class="subtile-title">
          Send us a messsage and we will get back to you.
        </p>
        <form id="contactForm">
          <div class="form-row">
            <label for="fullname">Full name</label>
            <input
              type="text"
              id="fullName"
              required
              placeholder="Enter your full name"
            />
          </div>

          <div class="form-row">
            <label for="emailAdress">Email</label>
            <input
              type="email"
              id="emailAdress"
              required
              placeholder="Enter your email address"
            />
          </div>


          <div class="form-row">
            <label for="subjectTopic">Subject</label>
            <select id="subjectTopic" required>
                <option value="" disabled selected> Choose a topic</option>
                <option value="billing"> Billing & Invoices</option>
                <option value="technical">Technical Error Bug</option>
                <option value="feedback">General Performance Feedback</option>
            </select>
          </div>
        </form>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
