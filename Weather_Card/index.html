<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Weather Card</title>
  </head>
  <body>
    <!-- Weather card Container -->
    <article class="weather-card">
      <header class="card-header">
        <h1 class="city-name">Bengaluru</h1>
        <p class="current-date">Thrusday, 18 June</p>
      </header>

      <!-- Middle section -->
      <section class="main-weather">
        <div class="weather-icon">☀️</div>
        <div class="temperature-container">
          <span class="temp-number">28</span>
          <span class="temp-unit">°C</span>
        </div>
        <p class="weather-condition">Sunny Sky</p>
      </section>
      <footer class="weather-details">
        <div class="detail-item">
          <span class="detail-icon">💧</span>
          <div class="detail-info">
            <span class="detail-value">64%</span>
            <span class="detail-label">Humidity</span>
          </div>
        </div>

        <div class="detail-item">
          <span class="detail-icon">💨</span>
          <div class="detail-info">
            <span class="detail-value">12 km/h</span>
            <span class="detail-label">Wind</span>
          </div>
        </div>
      </footer>
    </article>
  </body>
</html>
