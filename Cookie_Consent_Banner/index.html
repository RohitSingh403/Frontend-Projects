<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Cookie Consent Banner</title>
  </head>
  <body>
    <div class="mock-page">
      <header class="mock-header">
        <div class="mock-logo"></div>
        <div class="mock-nav"><span></span><span></span></div>
      </header>
      <div class="mock-hero"></div>
      <div class="mock-test-block">
        <div class="line short"></div>
        <div class="line long"></div>
        <div class="line medium"></div>
      </div>
    </div>

    <!-- -----COOKIE CONSENT BANNER----- -->
    <!-- ------------------------------- -->
    <div id="cookieBanner" class="cookie-banner hidden">
      <button
        id="closeBannerBtn"
        class="close-x-btn"
        aria-label="Close template"
      >
        &times;
      </button>
      <!-- --------------------- -->
      <div class="cookie-icon-wrapper">
        <svg class="cookie-svg" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm-3.5 5a1.5 1.5 0 1 1-1.5 1.5A1.5 1.5 0 0 1 8.5 7zm-.5 7a1.5 1.5 0 1 1 1.5-1.5A1.5 1.5 0 0 1 8 14zm4.5 3a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5zm1-6a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5zm3.5 4a1 1 0 1 1-1-1 1 1 0 0 1 1 1z"
          />
        </svg>
      </div>
      <p class="cookie-message">
        We use cookies to improve your user experience.
      </p>

      <button id="acceptCookiesBtn" class="accept-btn">I like Cookies</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
